<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Readify - Adicionar Livro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <header class="header">
            <button class="back-btn"><i class="fas fa-chevron-left"></i></button>
            <h1>Adicionar Livro</h1>
        </header>

        <main class="content">
            <div class="top-row">
                <div class="upload-cover">
                    <i class="fas fa-plus"></i>
                    <span>Selecionar capa</span>
                </div>
                
                <div class="inputs-main">
                    <input type="text" placeholder="Título do Livro" class="main-title">
                    <input type="text" placeholder="Autor">
                    <input type="text" placeholder="Ano">
                    <input type="text" placeholder="Categoria">
                </div>
            </div>

            <div class="comment-section">
                <label>Comentário (Opcional)</label>
                <textarea rows="4"></textarea>
            </div>

            <div class="rating-section">
                <label>Sua avaliação:</label>
                <div class="stars">
                    <i class="far fa-star"></i>
                    <i class="far fa-star"></i>
                    <i class="far fa-star"></i>
                    <i class="far fa-star"></i>
                    <i class="far fa-star"></i>
                </div>
            </div>

            <div class="actions">
                <button class="btn-cancel">Cancelar</button>
                <button class="btn-save"><i class="far fa-save"></i> Salvar Livro</button>
            </div>
        </main>

        <nav class="navbar">
            <div class="nav-item"><i class="fas fa-home"></i><span>Home</span></div>
            <div class="nav-item active"><i class="fas fa-book-open"></i><span>Meus Livros</span></div>
            <div class="nav-item"><i class="fas fa-star"></i><span>Favoritos</span></div>
            <div class="nav-item"><i class="fas fa-user"></i><span>Perfil</span></div>
        </nav>
    </div>

</body>
</html>
