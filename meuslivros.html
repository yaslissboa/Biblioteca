<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meus Livros</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'DM Sans', Arial, sans-serif;
    background: #ffffff;
    padding-bottom: 80px;
    display: flex;
    justify-content: center;
}

.container {
    width: 100%;
    max-width: 480px;
}

/* topo */
.topo {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 16px 10px;
    background: white;
    position: sticky;
    top: 0;
    z-index: 10;
}

.topo h1 {
    font-size: 18px;
    font-weight: 700;
    color: #1e2a4a;
}

.voltar {
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
    border-radius: 10px;
    font-size: 20px;
}

.voltar:hover {
    background: #f3f4f6;
}

/* intro */
.intro {
    background: #faf0e6;
    margin: 10px 16px;
    padding: 20px;
    border-radius: 16px;
    text-align: center;
}

.intro h2 {
    font-size: 15px;
    margin-bottom: 14px;
    color: #555;
}

/* busca */
.buscar input {
    width: 100%;
    padding: 12px 16px;
    border-radius: 999px;
    border: none;
    background: white;
    font-size: 14px;
    outline: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.buscar input:focus {
    box-shadow: 0 0 0 2px #3b9e8c33;
}

/* contador */
.contador {
    padding: 10px 16px;
    font-size: 12px;
    color: #888;
}

/* grid */
.livros {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    padding: 0 16px 20px;
}

/* card */
.livro {
    cursor: pointer;
    transition: 0.2s;
}

.livro:hover {
    transform: scale(1.04);
}

/* imagem */
.livro img {
    width: 100%;
    height: 140px;
    object-fit: cover;
    border-radius: 12px;
}

/* info */
.livro-info {
    padding-top: 6px;
}

.livro-titulo {
    font-size: 12px;
    font-weight: 700;
    color: #1e2a4a;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.livro-autor {
    font-size: 11px;
    color: #777;
}

/* vazio */
.sem-resultados {
    text-align: center;
    padding: 40px 20px;
    color: #aaa;
    font-size: 13px;
    grid-column: 1 / -1;
}

/* menu */
.menu {
    position: fixed;
    bottom: 0;
    width: 100%;
    max-width: 480px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    border-top: 1px solid #eee;
    display: flex;
    justify-content: space-around;
    padding: 8px 0;
}

.menu a {
    text-decoration: none;
    color: #666;
    font-size: 12px;
}

.menu div {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.menu img {
    width: 22px;
    margin-bottom: 2px;
    opacity: 0.7;
}

.menu .ativo {
    color: #3b9e8c;
}

.menu .ativo img {
    opacity: 1;
}
</style>
</head>

<body>

<div class="container">

<header class="topo">
    <button class="voltar" onclick="history.back()">←</button>
    <h1>Meus Livros</h1>
    <div style="width:24px;"></div>
</header>

<section class="intro">
    <h2>Organize e acompanhe seus livros</h2>
    <div class="buscar">
        <input type="text" id="search" placeholder="Buscar por título ou autor...">
    </div>
</section>

<div class="contador" id="contador"></div>

<section class="livros" id="listaLivros"></section>

<div class="menu">
    <a href="home.html">
        <div>
            <img src="icons/inicio.svg">
            <span>Home</span>
        </div>
    </a>
    
    <a href="meuslivros.html" class="ativo">
        <div>
            <img src="icons/meuslivros.svg">
            <span>Meus Livros</span>
        </div>
    </a>
    
    <a href="favoritos.html">
        <div>
            <img src="icons/favoritos.svg">
            <span>Favoritos</span>
        </div>
    </a>
    
    <a href="perfil.html">
        <div>
            <img src="icons/perfil.svg">
            <span>Perfil</span>
        </div>
    </a>
</div>

</div>

<script>
const livrosData = [
    { titulo: "Labirinto do Fauno", autor: "Cornelia Funke", imagem: "https://m.media-amazon.com/images/I/71+yGuF-ioL._AC_UF1000,1000_QL80_.jpg" },
    { titulo: "Para Algernon", autor: "Daniel Keyes", imagem: "https://m.media-amazon.com/images/I/91i29TgAsvL._UF1000,1000_QL80_.jpg" },
    { titulo: "Vampiro", autor: "Ann Rice", imagem: "https://m.media-amazon.com/images/I/71uPPT8QB2L._SY342_.jpg" },
    { titulo: "Caça ao Lobisomem", autor: "Toni Brandão", imagem: "https://globaleditora.com.br/capas/400/3450.jpg" },
    { titulo: "Frankenstein", autor: "Mary Shelley", imagem: "https://m.media-amazon.com/images/I/61H-JBmwTEL._SY445_SX342_ML2_.jpg" },
    { titulo: "Extraordinário", autor: "R. J. Palacio", imagem: "https://m.media-amazon.com/images/I/6132ndvQdiL._AC_UF1000,1000_QL80_.jpg" }
];

const livrosContainer = document.getElementById('listaLivros');
const searchInput = document.getElementById('search');
const contador = document.getElementById('contador');

function renderizarLivros(filtro = '') {
    const termo = filtro.toLowerCase().trim();

    const filtrados = livrosData.filter(livro =>
        livro.titulo.toLowerCase().includes(termo) ||
        livro.autor.toLowerCase().includes(termo)
    );

    contador.textContent = `${filtrados.length} ${filtrados.length === 1 ? 'livro encontrado' : 'livros encontrados'}`;

    livrosContainer.innerHTML = '';

    if (filtrados.length === 0) {
        livrosContainer.innerHTML = '<div class="sem-resultados">Nenhum livro encontrado</div>';
        return;
    }

    filtrados.forEach(livro => {
        const div = document.createElement('div');
        div.className = 'livro';

        div.innerHTML = `
            <img src="${livro.imagem}">
            <div class="livro-info">
                <div class="livro-titulo">${livro.titulo}</div>
                <div class="livro-autor">${livro.autor}</div>
            </div>
        `;

        div.onclick = () => {
            alert(`${livro.titulo}\n${livro.autor}`);
        };

        livrosContainer.appendChild(div);
    });
}

searchInput.addEventListener('input', e => {
    renderizarLivros(e.target.value);
});

renderizarLivros();
</script>

</body>
</html>
