<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>Meus Livros</title>
<link rel="stylesheet">

<style> 
    body{
font-family: Arial;
margin:0;
background:#f3f3f3;
}

/* topo */
.topo{
display:flex;
align-items:center;
padding:15px;
background:white;
border-bottom:2px solid #ffe4e4;
}

.topo h1{
flex:1;
text-align:center;
font-size:20px;
font-family: Arial;
color: #fe7c2c;
}

.voltar{
background:none;
border:none;
font-size:18px;
cursor: pointer;
}

/* intro */

.intro{
background:#ffe0ca;
padding:20px;
text-align:center;
}

.intro h2{
font-size:18px;
margin-bottom:15px;
}

/* aba de pesquisa */

.buscar input{
width:90%;
align-items: center;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

/* grade dos livros */

.livros{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
padding:15px;
align-items: center;
}

.livro img{
width:100%;
height: 150px;
border: 1px solid #ccc;
object-fit: cover;
align-content: center;
}

/* menu inferior */

.menu{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px 0;
border-top:1px solid #ccc;
}

.item{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
color:#666;
}

.item.ativo{
color:#c96;
}
</style>
</head>

<body>
 
<header class="topo">
<button class="voltar">←</button>
<h1>Meus Livros</h1>
</header>

<section class="intro">
<h2>Organize e avalie seus livros favoritos aqui!</h2>

<div class="buscar">
<input type="text" id="search" placeholder="Digite o nome da obra ou seu autor...">
</div>
</section>

<section class="livros" id="listaLivros">

<div class="livro">
<img src="https://m.media-amazon.com/images/I/71+yGuF-ioL._AC_UF1000,1000_QL80_.jpg">
</div>

<div class="livro">
<img src="https://m.media-amazon.com/images/I/91i29TgAsvL._UF1000,1000_QL80_.jpg">
</div>

<div class="livro">
<img src="https://m.media-amazon.com/images/I/71uPPT8QB2L._SY342_.jpg">
</div>

<div class="livro">
<img src="https://globaleditora.com.br/capas/400/3450.jpg">
</div>

<div class="livro">
<img src="https://m.media-amazon.com/images/I/61H-JBmwTEL._SY445_SX342_ML2_.jpg">
</div>

<div class="livro">
<img src="https://m.media-amazon.com/images/I/6132ndvQdiL._AC_UF1000,1000_QL80_.jpg">
</div>

</section>

<nav class="menu">
<div class="item">🏠<span>Home</span></div>
<div class="item ativo">📚<span>Meus Livros</span></div>
<div class="item">⭐<span>Favoritos</span></div>
<div class="item">👤<span>Perfil</span></div>
</nav>

</body>
</html>
